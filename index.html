<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STL VR Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');

  :root {
    --bg:        #080c10;
    --surface:   #0d1520;
    --border:    #1a2e44;
    --accent:    #00e5ff;
    --accent2:   #ff6b35;
    --text:      #c8dce8;
    --dim:       #4a6278;
    --success:   #00ff88;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  /* ── キャンバス ── */
  #canvas {
    display: block;
    width: 100%; height: 100%;
    position: fixed; inset: 0;
    cursor: grab;
  }
  #canvas:active { cursor: grabbing; }

  /* ── VRモードのセンター分割線 ── */
  #vr-divider {
    display: none;
    position: fixed;
    left: 50%; top: 0;
    width: 2px; height: 100%;
    background: #000;
    z-index: 10;
    pointer-events: none;
  }
  body.vr-mode #vr-divider { display: block; }
  body.vr-mode #canvas { cursor: none; }

  /* ── UI パネル ── */
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    pointer-events: none;
  }
  body.vr-mode #ui { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(to bottom, rgba(8,12,16,.95), transparent);
    pointer-events: all;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--dim); }

  .controls {
    display: flex; gap: 8px; align-items: center;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    text-transform: uppercase;
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity .15s;
  }
  .btn:hover { color: var(--accent); border-color: var(--accent); }
  .btn:hover::before { opacity: .05; }
  .btn.active { color: var(--accent2); border-color: var(--accent2); }

  /* ── ドロップゾーン ── */
  #dropzone {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity .3s;
  }
  #dropzone.hidden { opacity: 0; pointer-events: none; }

  .drop-box {
    width: min(480px, 90vw);
    border: 1px solid var(--border);
    padding: 48px 40px;
    text-align: center;
    position: relative;
    background: var(--surface);
    transition: border-color .2s;
  }
  .drop-box::before, .drop-box::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--accent);
    border-style: solid;
  }
  .drop-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .drop-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .drop-box.dragover { border-color: var(--accent); }
  .drop-box.dragover::before, .drop-box.dragover::after { animation: corner-pulse .5s infinite alternate; }

  @keyframes corner-pulse {
    to { opacity: .3; }
  }

  .drop-icon {
    width: 56px; height: 56px;
    margin: 0 auto 24px;
    position: relative;
  }
  .drop-icon svg { width: 100%; height: 100%; stroke: var(--accent); fill: none; }

  .drop-title {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .drop-sub {
    font-size: 14px;
    color: var(--dim);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .file-btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    padding: 10px 28px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity .15s;
  }
  .file-btn:hover { opacity: .85; }

  #file-input { display: none; }

  /* ── ステータスバー ── */
  #statusbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: linear-gradient(to top, rgba(8,12,16,.95), transparent);
    pointer-events: none;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
  }
  body.vr-mode #statusbar { display: none; }

  #status-file { color: var(--accent); letter-spacing: 1px; }
  #status-info { letter-spacing: .5px; }

  /* ── VR終了ボタン ── */
  #vr-exit {
    display: none;
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 24px;
    background: rgba(255,107,53,.15);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    cursor: pointer;
    text-transform: uppercase;
  }
  body.vr-mode #vr-exit { display: block; }

  /* ── ローディング ── */
  #loading {
    display: none;
    position: fixed;
    inset: 0; z-index: 60;
    background: rgba(8,12,16,.85);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #loading.show { display: flex; }
  .loading-bar {
    width: 200px; height: 2px;
    background: var(--border);
    overflow: hidden;
  }
  .loading-bar-inner {
    height: 100%;
    background: var(--accent);
    animation: loading-anim 1s ease-in-out infinite;
  }
  @keyframes loading-anim {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }
  .loading-text {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  /* ── VRモード：操作説明 ── */
  #vr-hint {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 25;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,229,255,.4);
    text-align: center;
    pointer-events: none;
    animation: hint-fade 3s ease forwards;
  }
  body.vr-mode #vr-hint { display: block; }
  @keyframes hint-fade {
    0%   { opacity: 1; }
    60%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── スキャンライン演出 ── */
  #scanline {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,.03) 3px,
      rgba(0,0,0,.03) 4px
    );
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="vr-divider"></div>
<div id="scanline"></div>

<!-- UI -->
<div id="ui">
  <div class="topbar">
    <div class="logo">STL<span>::</span>VR<span> /</span> Viewer</div>
    <div class="controls">
      <button class="btn" id="btn-reset" title="視点リセット">RESET</button>
      <button class="btn" id="btn-wireframe">WIRE</button>
      <button class="btn" id="btn-color">COLOR</button>
      <button class="btn" id="btn-open">OPEN STL</button>
      <button class="btn active" id="btn-vr">⬛ VR MODE</button>
    </div>
  </div>
</div>

<!-- ドロップゾーン -->
<div id="dropzone" class="hidden">
  <div class="drop-box" id="drop-box">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" stroke-width="1.2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="drop-title">STL ファイルを開く</div>
    <div class="drop-sub">
      ここにファイルをドラッグ＆ドロップ<br>
      または下のボタンから選択
    </div>
    <button class="file-btn" id="file-btn-open">ファイルを選択</button>
    <input type="file" id="file-input" accept=".stl">
  </div>
</div>

<!-- ローディング -->
<div id="loading">
  <div class="loading-text">LOADING STL</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<!-- VR -->
<div id="vr-hint">GYROSCOPE ACTIVE<br>スマートフォンを動かして視点を操作</div>
<button id="vr-exit">✕ EXIT VR</button>

<!-- ステータスバー -->
<div id="statusbar">
  <span id="status-file">NO FILE LOADED</span>
  <span id="status-info"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// STL Parser（ASCII / Binary 両対応）
// ============================================================
function parseSTL(buffer) {
  // ASCII判定
  const text = new TextDecoder().decode(new Uint8Array(buffer, 0, 256));
  if (text.trimStart().startsWith('solid') && text.includes('facet')) {
    return parseASCII(new TextDecoder().decode(buffer));
  }
  return parseBinary(buffer);
}

function parseBinary(buffer) {
  const view = new DataView(buffer);
  const nFaces = view.getUint32(80, true);
  const positions = new Float32Array(nFaces * 9);
  const normals   = new Float32Array(nFaces * 9);
  let offset = 84;
  for (let i = 0; i < nFaces; i++) {
    const nx = view.getFloat32(offset,     true);
    const ny = view.getFloat32(offset + 4, true);
    const nz = view.getFloat32(offset + 8, true);
    offset += 12;
    for (let v = 0; v < 3; v++) {
      const base = i * 9 + v * 3;
      positions[base]     = view.getFloat32(offset,     true);
      positions[base + 1] = view.getFloat32(offset + 4, true);
      positions[base + 2] = view.getFloat32(offset + 8, true);
      normals[base]     = nx;
      normals[base + 1] = ny;
      normals[base + 2] = nz;
      offset += 12;
    }
    offset += 2; // attribute
  }
  return { positions, normals, faceCount: nFaces };
}

function parseASCII(text) {
  const posArr = [], normArr = [];
  const lines = text.split('\n');
  let nx = 0, ny = 0, nz = 0;
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('facet normal')) {
      const p = t.split(/\s+/);
      nx = parseFloat(p[2]); ny = parseFloat(p[3]); nz = parseFloat(p[4]);
    } else if (t.startsWith('vertex')) {
      const p = t.split(/\s+/);
      posArr.push(parseFloat(p[1]), parseFloat(p[2]), parseFloat(p[3]));
      normArr.push(nx, ny, nz);
    }
  }
  return {
    positions: new Float32Array(posArr),
    normals:   new Float32Array(normArr),
    faceCount: posArr.length / 9
  };
}

// ============================================================
// Three.js セットアップ
// ============================================================
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x080c10);

const scene = new THREE.Scene();
scene.fog   = new THREE.FogExp2(0x080c10, 0.015);

// カメラ（通常モード）
const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 1000);
camera.position.set(0, 1.5, 4);

// VR用カメラ（左右）
const camL = new THREE.PerspectiveCamera(70, 1, 0.01, 1000);
const camR = new THREE.PerspectiveCamera(70, 1, 0.01, 1000);
const IPD  = 0.064; // 瞳孔間距離

// ライティング
const ambientLight = new THREE.AmbientLight(0x1a2e44, 1.2);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0x00e5ff, 1.0);
dirLight1.position.set(5, 8, 5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xff6b35, 0.4);
dirLight2.position.set(-5, -3, -5);
scene.add(dirLight2);

// グリッド
const grid = new THREE.GridHelper(20, 40, 0x1a2e44, 0x0d1520);
scene.add(grid);

// ============================================================
// マテリアル
// ============================================================
const solidMat = new THREE.MeshPhongMaterial({
  vertexColors: true,
  shininess: 40,
  specular: new THREE.Color(0x223344)
});
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x00e5ff,
  wireframe: true,
  opacity: 0.6,
  transparent: true
});

let currentMode = 'color'; // 'color' | 'wire' | 'solid'

// ============================================================
// STLロード
// ============================================================
let meshGroup = null;
let modelInfo = { vertices: 0, faces: 0, size: '' };

function loadSTLBuffer(buffer, filename) {
  document.getElementById('loading').classList.add('show');
  setTimeout(() => {
    try {
      const { positions, normals, faceCount } = parseSTL(buffer);

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('normal',   new THREE.BufferAttribute(normals,   3));

      // 標高ベース色付け（Z軸：低=緑 / 中=黄 / 高=赤）
      applyElevationColor(geo);

      // 中心・スケール正規化
      geo.computeBoundingBox();
      const box  = geo.boundingBox;
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale  = 2.0 / maxDim;
      const center = new THREE.Vector3();
      box.getCenter(center);

      // メッシュ作成
      if (meshGroup) scene.remove(meshGroup);
      meshGroup = new THREE.Group();

      const solidMesh = new THREE.Mesh(geo, solidMat.clone());
      solidMesh.scale.setScalar(scale);
      solidMesh.position.copy(center.clone().negate().multiplyScalar(scale));
      solidMesh.castShadow = true;
      solidMesh.name = 'solid';

      const wireGeo   = geo.clone();
      const wireMesh  = new THREE.Mesh(wireGeo, wireMat.clone());
      wireMesh.scale.setScalar(scale);
      wireMesh.position.copy(center.clone().negate().multiplyScalar(scale));
      wireMesh.name = 'wire';
      wireMesh.visible = false;

      meshGroup.add(solidMesh, wireMesh);
      scene.add(meshGroup);

      // グリッドをモデル下部に合わせる
      const newBox = new THREE.Box3().setFromObject(meshGroup);
      const newSize = new THREE.Vector3();
      newBox.getSize(newSize);
      grid.position.y = newBox.min.y - 0.01;

      // カメラ位置リセット
      const dist = newSize.length() * 1.4;
      orbitState.radius   = dist;
      orbitState.theta    = 0.5;
      orbitState.phi      = Math.PI / 3;
      orbitState.target.set(0, 0, 0);
      updateCameraFromOrbit();

      modelInfo.vertices = faceCount * 3;
      modelInfo.faces    = faceCount;
      modelInfo.size     = `${size.x.toFixed(1)}×${size.y.toFixed(1)}×${size.z.toFixed(1)}`;

      document.getElementById('status-file').textContent = filename.toUpperCase();
      document.getElementById('status-info').textContent =
        `FACES: ${faceCount.toLocaleString()}  VERTS: ${modelInfo.vertices.toLocaleString()}  SIZE: ${modelInfo.size}`;

      applyDisplayMode(currentMode);
      document.getElementById('dropzone').classList.add('hidden');
    } catch(e) {
      alert('STL読み込みエラー: ' + e.message);
      console.error(e);
    }
    document.getElementById('loading').classList.remove('show');
  }, 50);
}

function applyElevationColor(geo) {
  const pos = geo.attributes.position;
  const colors = new Float32Array(pos.count * 3);

  // Z の min/max を求める
  let zMin = Infinity, zMax = -Infinity;
  for (let i = 0; i < pos.count; i++) {
    const z = pos.getY(i);  // Three.js では Y が上
    if (z < zMin) zMin = z;
    if (z > zMax) zMax = z;
  }
  const zRange = Math.max(zMax - zMin, 1e-6);

  for (let i = 0; i < pos.count; i++) {
    const t = (pos.getY(i) - zMin) / zRange; // 0〜1
    let r, g, b;
    if (t < 0.5) {
      const v = t * 2;
      r = v;
      g = 0.78 + v * 0.22;
      b = 0;
    } else {
      const v = (t - 0.5) * 2;
      r = 1.0;
      g = 1.0 - v;
      b = 0;
    }
    colors[i * 3]     = r;
    colors[i * 3 + 1] = g;
    colors[i * 3 + 2] = b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
}

function applyDisplayMode(mode) {
  currentMode = mode;
  if (!meshGroup) return;
  const solid = meshGroup.getObjectByName('solid');
  const wire  = meshGroup.getObjectByName('wire');
  if (!solid || !wire) return;

  if (mode === 'wire') {
    solid.visible = false;
    wire.visible  = true;
  } else if (mode === 'color') {
    solid.visible = true;
    wire.visible  = false;
    solid.material.vertexColors = true;
    solid.material.color.set(0xffffff);
    solid.material.needsUpdate = true;
  } else {
    solid.visible = true;
    wire.visible  = false;
    solid.material.vertexColors = false;
    solid.material.color.set(0x00e5ff);
    solid.material.needsUpdate = true;
  }
}

// ============================================================
// オービットコントロール（独自実装）
// ============================================================
const orbitState = {
  theta:  0.5,
  phi:    Math.PI / 3,
  radius: 5,
  target: new THREE.Vector3(0, 0, 0),
  isDragging: false,
  lastX: 0, lastY: 0,
};

function updateCameraFromOrbit() {
  const s = orbitState;
  const x = s.radius * Math.sin(s.phi) * Math.sin(s.theta);
  const y = s.radius * Math.cos(s.phi);
  const z = s.radius * Math.sin(s.phi) * Math.cos(s.theta);
  camera.position.set(
    s.target.x + x,
    s.target.y + y,
    s.target.z + z
  );
  camera.lookAt(s.target);
}

canvas.addEventListener('mousedown', e => {
  orbitState.isDragging = true;
  orbitState.lastX = e.clientX;
  orbitState.lastY = e.clientY;
});
canvas.addEventListener('mouseup',   () => { orbitState.isDragging = false; });
canvas.addEventListener('mousemove', e => {
  if (!orbitState.isDragging || vrMode) return;
  const dx = e.clientX - orbitState.lastX;
  const dy = e.clientY - orbitState.lastY;
  orbitState.theta -= dx * 0.005;
  orbitState.phi    = Math.max(0.05, Math.min(Math.PI - 0.05, orbitState.phi + dy * 0.005));
  orbitState.lastX  = e.clientX;
  orbitState.lastY  = e.clientY;
  updateCameraFromOrbit();
});
canvas.addEventListener('wheel', e => {
  if (vrMode) return;
  e.preventDefault();
  orbitState.radius = Math.max(0.5, Math.min(50, orbitState.radius + e.deltaY * 0.01));
  updateCameraFromOrbit();
}, { passive: false });

// タッチ操作
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    orbitState.isDragging = true;
    orbitState.lastX = e.touches[0].clientX;
    orbitState.lastY = e.touches[0].clientY;
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
});
canvas.addEventListener('touchend',   () => { orbitState.isDragging = false; });
canvas.addEventListener('touchmove',  e => {
  e.preventDefault();
  if (e.touches.length === 1 && orbitState.isDragging && !vrMode) {
    const dx = e.touches[0].clientX - orbitState.lastX;
    const dy = e.touches[0].clientY - orbitState.lastY;
    orbitState.theta -= dx * 0.005;
    orbitState.phi    = Math.max(0.05, Math.min(Math.PI - 0.05, orbitState.phi + dy * 0.005));
    orbitState.lastX  = e.touches[0].clientX;
    orbitState.lastY  = e.touches[0].clientY;
    updateCameraFromOrbit();
  }
  if (e.touches.length === 2 && lastTouchDist !== null) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    orbitState.radius = Math.max(0.5, Math.min(50, orbitState.radius * (lastTouchDist / d)));
    lastTouchDist = d;
    updateCameraFromOrbit();
  }
}, { passive: false });

// ============================================================
// VR モード（ジャイロ + サイドバイサイドステレオ）
// ============================================================
let vrMode = false;
let gyroEuler   = { alpha: 0, beta: 0, gamma: 0 };
let vrQuat      = new THREE.Quaternion();
let vrBaseQuat  = null;

// ── 6DoF 位置トラッキング ──────────────────────────
// DeviceMotionEvent の加速度を2回積分して位置を推定する。
//
// 重力除去：e.acceleration（重力補正済み）を優先。
// nullの場合はジャイロのクォータニオンでワールド重力を
// デバイス座標系に変換して差し引く（iOS対応）。
//
// ドリフト補正：速度・位置に時間ベースの減衰を適用。
// 静止すると自然に原点に戻る。
const sixdof = {
  vel:          new THREE.Vector3(),
  pos:          new THREE.Vector3(),
  rawAccel:     new THREE.Vector3(),   // 生加速度（重力込み）
  cleanAccel:   new THREE.Vector3(),   // 重力除去済み（ブラウザ提供）
  hpPrev:       new THREE.Vector3(),   // ハイパスフィルタ前フレーム値
  hpOut:        new THREE.Vector3(),   // ハイパスフィルタ出力
  lastTime:     null,
  enabled:      false,
  hasClean:     false,
  // ── チューニングパラメータ ──
  SCALE:        0.6,     // 位置スケール（感度）
  VEL_DAMPING:  4.0,     // 速度減衰（/秒）: 大きいほど素早く止まる
  DRIFT_K:      0.4,     // ドリフト補正（/秒）: 小さいほど位置を保持
  MAX_POS:      1.5,     // 最大移動距離（m）
  THRESHOLD:    0.15,    // 静止判定閾値（m/s²）
  HP_ALPHA:     0.85,    // ハイパスフィルタ係数（重力除去強度）
};

// 重力ベクトル（ワールド座標系、Y軸下向き）
const GRAVITY = new THREE.Vector3(0, -9.81, 0);

function enterVR() {
  if (!meshGroup) { alert('先にSTLファイルを読み込んでください'); return; }
  vrMode = true;
  document.body.classList.add('vr-mode');
  vrBaseQuat = null;
  hideOverlay();
  sixdof.pos.set(0, 0, 0);
  sixdof.vel.set(0, 0, 0);
  // VRモード開始時にキャンバスサイズをウィンドウに合わせる
  const vvp = window.visualViewport || window;
  renderer.setSize(
    Math.floor(vvp.width  || window.innerWidth),
    Math.floor(vvp.height || window.innerHeight)
  );

  // ジャイロ許可リクエスト（iOS 13+）
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => { if (state === 'granted') initGyro(); })
      .catch(() => initGyro());
  } else {
    initGyro();
  }

  // フルスクリーン
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}

function exitVR() {
  vrMode = false;
  vrBaseQuat = null;
  document.body.classList.remove('vr-mode');
  hideOverlay();
  stopMotion();
  window.removeEventListener('deviceorientation', onGyro, true);
  if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
  resize();
}

function initGyro() {
  window.addEventListener('deviceorientation', onGyro, true);
  startMotion();
}

function onMotion(e) {
  if (!vrMode || !sixdof.enabled) return;

  const aClean = e.acceleration;                  // 重力除去済み（対応ブラウザ）
  const aRaw   = e.accelerationIncludingGravity;  // 常に利用可能

  if (aClean && aClean.x !== null && Math.abs(aClean.x) + Math.abs(aClean.y) + Math.abs(aClean.z) > 0) {
    // 方法A: ブラウザが重力除去済み加速度を提供してくれる場合
    sixdof.hasClean = true;
    sixdof.cleanAccel.set(aClean.x || 0, aClean.y || 0, aClean.z || 0);
  } else if (aRaw && aRaw.x !== null) {
    // 方法B: 生加速度からジャイロで重力を差し引く（iOSなど）
    sixdof.hasClean = false;
    sixdof.rawAccel.set(aRaw.x || 0, aRaw.y || 0, aRaw.z || 0);
  }
}

function startMotion() {
  sixdof.vel.set(0, 0, 0);
  sixdof.pos.set(0, 0, 0);
  sixdof.lastTime = null;
  sixdof.enabled  = false;

  const doStart = () => {
    sixdof.enabled = true;
    window.addEventListener('devicemotion', onMotion, true);
  };

  // iOS 13+: DeviceMotionEvent にも許可が必要
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(state => { if (state === 'granted') doStart(); })
      .catch(() => doStart());
  } else {
    doStart();
  }
}

function stopMotion() {
  sixdof.enabled = false;
  sixdof.vel.set(0, 0, 0);
  sixdof.pos.set(0, 0, 0);
  window.removeEventListener('devicemotion', onMotion, true);
}

function updateSixDof(deltaMs) {
  if (!sixdof.enabled || !vrMode) return;

  const dt = Math.min(deltaMs / 1000, 0.05);

  // ── 1. 重力除去済み加速度をセンサー座標系で取得 ──
  let ax, ay, az;

  if (sixdof.hasClean) {
    // ブラウザが重力除去済みを提供（Android Chrome等）
    ax = sixdof.cleanAccel.x;
    ay = sixdof.cleanAccel.y;
    az = sixdof.cleanAccel.z;
  } else {
    // ハイパスフィルタで重力（直流成分）を除去
    // α=0.85: 時定数 ≈ dt/(1-α) ≈ 100ms で重力をカット
    const rx = sixdof.rawAccel.x;
    const ry = sixdof.rawAccel.y;
    const rz = sixdof.rawAccel.z;
    const α  = sixdof.HP_ALPHA;
    sixdof.hpOut.x = α * (sixdof.hpOut.x + rx - sixdof.hpPrev.x);
    sixdof.hpOut.y = α * (sixdof.hpOut.y + ry - sixdof.hpPrev.y);
    sixdof.hpOut.z = α * (sixdof.hpOut.z + rz - sixdof.hpPrev.z);
    sixdof.hpPrev.set(rx, ry, rz);
    ax = sixdof.hpOut.x;
    ay = sixdof.hpOut.y;
    az = sixdof.hpOut.z;
  }

  // ── 2. センサー座標系 → 仮想ワールド座標系 ──
  // vrQuat は onGyro で画面向き補正・デバイス姿勢・基準回転を
  // すべて含んで計算済み。ここで再度 qOrient を掛けてはいけない。
  const accelWorld = new THREE.Vector3(ax, ay, az).applyQuaternion(vrQuat);

  // ── 3. 静止判定ノイズゲート ──
  if (accelWorld.length() < sixdof.THRESHOLD) {
    accelWorld.set(0, 0, 0);
    // 静止中は速度も積極的に減衰させる
    sixdof.vel.multiplyScalar(Math.exp(-sixdof.VEL_DAMPING * 3.0 * dt));
  }

  // ── 4. 速度積分（時間ベース減衰） ──
  sixdof.vel.addScaledVector(accelWorld, dt);
  sixdof.vel.multiplyScalar(Math.exp(-sixdof.VEL_DAMPING * dt));

  // ── 5. 位置積分（時間ベースドリフト補正） ──
  sixdof.pos.addScaledVector(sixdof.vel, dt * sixdof.SCALE);
  sixdof.pos.multiplyScalar(Math.exp(-sixdof.DRIFT_K * dt));

  // ── 6. 最大移動距離クランプ ──
  const len = sixdof.pos.length();
  if (len > sixdof.MAX_POS) sixdof.pos.setLength(sixdof.MAX_POS);
}

function onGyro(e) {
  if (!vrMode) return;

  const DEG = Math.PI / 180;
  const alpha = (e.alpha || 0) * DEG;
  const beta  = (e.beta  || 0) * DEG;
  const gamma = (e.gamma || 0) * DEG;

  // 画面の向き（ラジアン）
  // screen.orientation.angle: 0=縦, 90=右横, 270=左横
  const orientDeg = (screen.orientation && screen.orientation.angle != null)
    ? screen.orientation.angle
    : (window.orientation || 0);
  const orient = orientDeg * DEG;

  // ── Three.js DeviceOrientationControls 準拠の正規実装 ──
  //
  // Step1: alpha(Z回転), beta(X回転), gamma(Y回転) → クォータニオン
  //        回転順序は 'YXZ'（W3C deviceorientation 仕様に対応）
  const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
  const q = new THREE.Quaternion().setFromEuler(euler);

  // Step2: デバイス前面をカメラの前方向（-Z）に合わせる補正
  //        デバイス座標系ではZ上向きがデフォルトなので-X軸で-90°回転
  const qScreen = new THREE.Quaternion(
    -Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)  // -90° around X
  );
  q.multiply(qScreen);

  // Step3: 画面の回転（縦→横など）をZ軸回転で補正
  //        これにより landscape / portrait どちらでも正しく動く
  const qOrient = new THREE.Quaternion();
  qOrient.setFromAxisAngle(new THREE.Vector3(0, 0, 1), -orient);
  q.multiply(qOrient);

  // VR開始時の向きを基準として相対回転を計算
  if (!vrBaseQuat) {
    vrBaseQuat = q.clone().invert();
  }
  vrQuat = vrBaseQuat.clone().multiply(q);
}

// ============================================================
// Cardboard VR パラメータ（Google Cardboard v1）
// ============================================================
const CARD_K1  = 0.441;
const CARD_K2  = 0.156;
const CARD_FOV = 90;

// ============================================================
// 非対称フラスタム（Parallel Stereo）
// eyeSign: 左目=+1, 右目=-1
// ============================================================
function buildAsymmetricFrustum(cam, eyeSign, focalLength) {
  const fov    = THREE.MathUtils.degToRad(CARD_FOV);
  const aspect = cam.aspect;
  const near   = cam.near;
  const far    = cam.far;
  const top    =  near * Math.tan(fov / 2);
  const bottom = -top;
  const right0 =  top * aspect;
  const left0  = -right0;
  const shift  = (IPD / 2) * (near / Math.max(focalLength, 0.01)) * eyeSign;
  cam.projectionMatrix.makePerspective(
    left0 + shift, right0 + shift, top, bottom, near, far
  );
  cam.projectionMatrixInverse.copy(cam.projectionMatrix).invert();
}

// ============================================================
// renderVR
// RenderTargetは使わずviewport/scissorで直接描画する。
// iOS SafariはWebGLRenderTargetのコンポジットが不安定なため
// 直接描画方式が最も確実。
// 樽型歪みはCanvas 2Dオーバーレイで後処理する。
// ============================================================

// 樽型歪みオーバーレイ用canvas（遅延生成）
let _overlayCanvas = null;
let _overlayCtx    = null;

function getOverlay() {
  if (_overlayCanvas) return { c: _overlayCanvas, ctx: _overlayCtx };
  _overlayCanvas = document.createElement('canvas');
  _overlayCanvas.style.cssText =
    'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;';
  document.body.appendChild(_overlayCanvas);
  _overlayCtx = _overlayCanvas.getContext('2d');
  return { c: _overlayCanvas, ctx: _overlayCtx };
}

function applyBarrelDistortion(srcCanvas, eyeSign) {
  // eyeSign: 左=-1（左半分をコピー）, 右=+1（右半分をコピー）
  const { c: oc, ctx } = getOverlay();
  const W  = srcCanvas.width;
  const H  = srcCanvas.height;
  const hw = Math.floor(W / 2);

  oc.width  = W;
  oc.height = H;

  // 歪みなし側をそのままコピー（まずクリア）
  ctx.clearRect(0, 0, W, H);

  // 歪みテーブル（フルサイズ用・簡易ピクセルマッピング）
  // Canvas 2D は per-pixel 変換が重いため
  // ここでは WebGL で描いた内容をそのまま表示し
  // 樽型「見かけ効果」は非対称フラスタムの広角FOVで代替する。
  // ※ Canvas 2Dの drawImage + scale でレンズ効果を近似
  const cx = eyeSign < 0 ? hw / 2 : hw + hw / 2;
  const cy = H / 2;
  const sx = eyeSign < 0 ? 0 : hw;

  // 中央をわずかに拡大して外周を暗くする（ビネット効果）
  const scale = 1.08;
  const dw = hw * scale;
  const dh = H  * scale;
  const dx = cx - dw / 2;
  const dy = cy - dh / 2;

  ctx.save();
  ctx.drawImage(srcCanvas, sx, 0, hw, H, dx, dy, dw, dh);

  // ビネット（レンズ周辺減光）
  const gx = eyeSign < 0 ? hw / 2 : hw + hw / 2;
  const grad = ctx.createRadialGradient(gx, cy, hw * 0.35, gx, cy, hw * 0.75);
  grad.addColorStop(0,   'rgba(0,0,0,0)');
  grad.addColorStop(1,   'rgba(0,0,0,0.65)');
  ctx.fillStyle = grad;
  ctx.fillRect(eyeSign < 0 ? 0 : hw, 0, hw, H);
  ctx.restore();
}

function showOverlay() {
  if (_overlayCanvas) _overlayCanvas.style.display = 'block';
}
function hideOverlay() {
  if (_overlayCanvas) _overlayCanvas.style.display = 'none';
}

function renderVR() {
  // Three.js の setViewport/setScissor は CSS論理ピクセルで指定する。
  // renderer.domElement.width は物理ピクセル（DPR倍）なので使わない。
  // visualViewport はiOSのアドレスバー表示/非表示に関わらず
  // 実際に描画可能な領域を返す
  const vvp = window.visualViewport || window;
  const W   = Math.floor(vvp.width  || window.innerWidth);
  const H   = Math.floor(vvp.height || window.innerHeight);
  const hw  = Math.floor(W / 2);

  // 6DoF：deltaTimeを計算して位置を更新
  const now = performance.now();
  if (sixdof.lastTime !== null) {
    updateSixDof(now - sixdof.lastTime);
  }
  sixdof.lastTime = now;

  // カメラの向きを決定
  let baseQuat;
  if (vrBaseQuat) {
    baseQuat = vrQuat.clone();
  } else {
    const m = new THREE.Matrix4().lookAt(
      camera.position, orbitState.target, new THREE.Vector3(0, 1, 0)
    );
    baseQuat = new THREE.Quaternion().setFromRotationMatrix(m);
  }

  const rightVec    = new THREE.Vector3(1, 0, 0).applyQuaternion(baseQuat);
  const focalLength = Math.max(
    camera.position.distanceTo(orbitState.target), 0.1
  );
  const aspect = hw / H;

  // ── 左カメラ設定 ──
  // 6DoFオフセット：スマホの平行移動をカメラ位置に反映
  const posOffset = sixdof.pos.clone();
  camL.position.copy(camera.position).add(posOffset).addScaledVector(rightVec, -IPD / 2);
  camL.quaternion.copy(baseQuat);
  camL.matrixWorldNeedsUpdate = true;
  camL.updateMatrixWorld(true);
  camL.fov    = CARD_FOV;
  camL.aspect = aspect;
  camL.near   = camera.near;
  camL.far    = camera.far;
  camL.updateProjectionMatrix();
  buildAsymmetricFrustum(camL, +1, focalLength);

  // ── 右カメラ設定 ──
  camR.position.copy(camera.position).add(posOffset).addScaledVector(rightVec, +IPD / 2);
  camR.quaternion.copy(baseQuat);
  camR.matrixWorldNeedsUpdate = true;
  camR.updateMatrixWorld(true);
  camR.fov    = CARD_FOV;
  camR.aspect = aspect;
  camR.near   = camera.near;
  camR.far    = camera.far;
  camR.updateProjectionMatrix();
  buildAsymmetricFrustum(camR, -1, focalLength);

  // ── 直接viewport/scissorで各目を描画 ──
  renderer.setScissorTest(true);

  // 左目（画面左半分）
  renderer.setViewport(0,  0, hw, H);
  renderer.setScissor( 0,  0, hw, H);
  renderer.render(scene, camL);

  // 右目（画面右半分）
  renderer.setViewport(hw, 0, hw, H);
  renderer.setScissor( hw, 0, hw, H);
  renderer.render(scene, camR);

  // 状態リセット
  renderer.setScissorTest(false);
  renderer.setViewport(0, 0, W, H);
}

}
window.addEventListener('resize', resize);

// ============================================================
// デフォルト地形：パーリンノイズで山岳地形を生成
// ============================================================
function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerpN(a, b, t) { return a + t * (b - a); }

const perm = (() => {
  const p = Array.from({length: 256}, (_, i) => i);
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [p[i], p[j]] = [p[j], p[i]];
  }
  return [...p, ...p];
})();

function grad2(hash, x, y) {
  const h = hash & 3;
  const u = h < 2 ? x : y, v = h < 2 ? y : x;
  return (h & 1 ? -u : u) + (h & 2 ? -v : v);
}

function noise2(x, y) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const u = fade(xf), v = fade(yf);
  const a = perm[X] + Y, b = perm[X+1] + Y;
  return lerpN(
    lerpN(grad2(perm[a],   xf,   yf), grad2(perm[b],   xf-1, yf  ), u),
    lerpN(grad2(perm[a+1], xf,   yf-1), grad2(perm[b+1], xf-1, yf-1), u),
    v
  );
}

function fbm(x, y, octaves=6) {
  let v=0, amp=0.5, freq=1, max=0;
  for (let i=0; i<octaves; i++) {
    v += noise2(x*freq, y*freq) * amp;
    max += amp; amp *= 0.5; freq *= 2.1;
  }
  return v / max;
}

function generateDefaultTerrain() {
  const RES = 80, SCALE = 3.0;
  const positions = [], normals = [];

  const h = (nx, nz) => {
    const tx = nx/SCALE+0.5, tz = nz/SCALE+0.5;
    let v = fbm(tx*3.5, tz*3.5);
    const d = Math.sqrt((tx-0.5)*(tx-0.5)*0.5 + (tz-0.5)*(tz-0.5)*0.5);
    v = v*0.7 + Math.max(0, 0.4 - d*2.2)*0.9;
    const edge = Math.min(tx, tz, 1-tx, 1-tz) * 6;
    return Math.max(0, v * Math.min(1, edge)) * 2.0;
  };

  const pushTri = (ax,ay,az, bx,by,bz, cx,cy,cz) => {
    const ux=bx-ax, uy=by-ay, uz=bz-az;
    const vx=cx-ax, vy=cy-ay, vz=cz-az;
    const nx=uy*vz-uz*vy, ny=uz*vx-ux*vz, nz2=ux*vy-uy*vx;
    const nl=Math.sqrt(nx*nx+ny*ny+nz2*nz2)||1;
    for (let i=0;i<3;i++) normals.push(nx/nl, ny/nl, nz2/nl);
    positions.push(ax,ay,az, bx,by,bz, cx,cy,cz);
  };

  for (let iy=0; iy<RES; iy++) {
    for (let ix=0; ix<RES; ix++) {
      const x0=(ix/RES-0.5)*SCALE, x1=((ix+1)/RES-0.5)*SCALE;
      const z0=(iy/RES-0.5)*SCALE, z1=((iy+1)/RES-0.5)*SCALE;
      const y00=h(x0,z0), y10=h(x1,z0), y01=h(x0,z1), y11=h(x1,z1);
      pushTri(x0,y00,z0, x1,y10,z0, x0,y01,z1);
      pushTri(x1,y10,z0, x1,y11,z1, x0,y01,z1);
    }
  }
  return { positions: new Float32Array(positions), normals: new Float32Array(normals), faceCount: RES*RES*2 };
}

(function initDefault() {
  try {
  const data = generateDefaultTerrain();
  const geo  = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
  geo.setAttribute('normal',   new THREE.BufferAttribute(data.normals,   3));
  applyElevationColor(geo);

  if (meshGroup) scene.remove(meshGroup);
  meshGroup = new THREE.Group();
  const solidMesh = new THREE.Mesh(geo, solidMat.clone()); solidMesh.name='solid';
  const wireMesh  = new THREE.Mesh(geo.clone(), wireMat.clone()); wireMesh.name='wire'; wireMesh.visible=false;
  meshGroup.add(solidMesh, wireMesh);
  scene.add(meshGroup);

  const box=new THREE.Box3().setFromObject(meshGroup), sz=new THREE.Vector3();
  box.getSize(sz);
  grid.position.y   = box.min.y - 0.01;
  orbitState.radius = sz.length() * 1.2;
  orbitState.phi    = Math.PI / 3.5;
  updateCameraFromOrbit();

  document.getElementById('status-file').textContent = 'DEFAULT TERRAIN';
  document.getElementById('status-info').textContent = 'FACES: '+data.faceCount.toLocaleString()+'  PROCEDURAL GENERATION';
  document.getElementById('dropzone').classList.add('hidden');
  applyDisplayMode('color');
  } catch(e) {
    console.error('Default terrain error:', e);
    document.getElementById('dropzone').classList.remove('hidden');
  }
})();

// ============================================================
// 初期カメラ位置
// ============================================================
updateCameraFromOrbit();
</script>
